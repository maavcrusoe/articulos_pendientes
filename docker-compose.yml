version: '3.8'

services:
  articulos_pendientes:
    container_name: articulos_pendientes_app
    build:
      context: .
      args:
        - GITHUB_TOKEN=${GITHUB_TOKEN}
        - GITHUB_REPO=${GITHUB_REPO}
    ports:
      - "3005:3005"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=${DB_NAME}
      - CollectionName=${CollectionName}
      - ITEMS_PER_PAGE=${ITEMS_PER_PAGE}
      - PORT=${PORT}
      - SESSION_SECRET=${SESSION_SECRET}
      - NOTION_API=${NOTION_API}
      - NOTION_TABLE=${NOTION_TABLE}
      - NOTION_DATA_SOURCE_ID=${NOTION_DATA_SOURCE_ID}
    env_file:
      - .env
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "const http=require('http'); const req=http.get({host:'127.0.0.1', port:process.env.PORT || 3005, path:'/'}, (res) => process.exit(res.statusCode >= 200 && res.statusCode < 400 ? 0 : 1)); req.on('error', () => process.exit(1)); req.setTimeout(5000, () => { req.destroy(); process.exit(1); });"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - web
    restart: always

networks:
  web:
    external: true